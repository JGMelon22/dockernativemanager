name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev pkg-config fakeroot

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and Package Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Docker Native Manager ${{ github.ref_name }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false

      - name: Package for Arch Linux and Upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist-arch
          cd dist-arch
          
          # Generate PKGBUILD
          cat << 'EOF' > PKGBUILD
          pkgname=dockernativemanager-bin
          pkgver=${{ github.ref_name }}
          pkgver=${pkgver#v}
          pkgrel=1
          pkgdesc="A powerful, native, and cross-platform GUI for managing Docker environments"
          arch=('x86_64')
          url="https://github.com/pedrofariasx/dockernativemanager"
          license=('MIT')
          depends=('webkit2gtk-4.1' 'gtk3' 'cairo' 'pango' 'glib2')
          options=('!strip')
          
          package() {
            install -d "\$pkgdir/usr/bin"
            install -d "\$pkgdir/usr/share/pixmaps"
            install -d "\$pkgdir/usr/share/applications"
            
            # Copy compiled binary from workspace
            install -Dm755 /workspace/src-tauri/target/release/docker-native-manager "\$pkgdir/usr/bin/docker-native-manager"
            
            # Copy icon
            install -Dm644 /workspace/src-tauri/icons/icon.png "\$pkgdir/usr/share/pixmaps/docker-native-manager.png"
            
            # Create desktop entry
            cat << 'DESKTOP' > "\$pkgdir/usr/share/applications/docker-native-manager.desktop"
          [Desktop Entry]
          Name=Docker Native Manager
          Exec=docker-native-manager
          Icon=docker-native-manager
          Type=Application
          Categories=Development;
          DESKTOP
          }
          EOF
          
          cd ..
          
          # Run makepkg inside an Arch Linux container
          docker run --rm -v $PWD:/workspace -w /workspace/dist-arch archlinux:base-devel bash -c "pacman -Sy --noconfirm && useradd -m builduser && echo 'builduser ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers && chown -R builduser:builduser /workspace && su - builduser -c 'cd /workspace/dist-arch && makepkg -s --noconfirm'"
          
          # Upload package to the current GitHub Release
          cd dist-arch
          ARCH_PKG=$(ls *.pkg.tar.zst)
          gh release upload ${{ github.ref_name }} "$ARCH_PKG" --clobber
